<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCA CVR — Staffing</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-body { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }

    /* Summary stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 16px;
    }
    .stat-card .num { font-size: 32px; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-card .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Section header */
    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title span { color: var(--muted); font-size: 13px; font-weight: 400; }

    /* Campus block */
    .campus-block {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .campus-header {
      padding: 14px 18px; background: rgba(29,181,132,0.07);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    }
    .campus-header h3 { font-size: 15px; font-weight: 700; }
    .campus-header .campus-stats { display: flex; gap: 16px; }
    .campus-stat { font-size: 13px; color: var(--muted); }
    .campus-stat strong { color: var(--text); }

    .campus-body { padding: 12px 18px; display: flex; flex-direction: column; gap: 8px; }

    /* Volunteer row */
    .vol-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.03);
    }
    .vol-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(29,181,132,0.2); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .vol-info { flex: 1; }
    .vol-name { font-size: 14px; font-weight: 600; }
    .vol-user { font-size: 12px; color: var(--muted); }

    /* Category chips */
    .cat-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .cat-chip {
      padding: 4px 10px; border-radius: 20px; font-size: 12px;
      background: rgba(255,255,255,0.06); color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .cat-chip strong { color: var(--text); }

    /* Metrics */
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .metrics-grid { grid-template-columns: 1fr; } }

    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
    }
    .chart-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }

    /* CSS bar chart */
    .bar-chart { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-label { font-size: 12px; color: var(--muted); width: 70px; flex-shrink: 0; text-align: right; }
    .bar-track { flex: 1; background: rgba(255,255,255,0.06); border-radius: 4px; height: 20px; overflow: hidden; }
    .bar-fill  { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.6s ease; min-width: 2px; }
    .bar-fill.special { background: var(--highlight); }
    .bar-count { font-size: 12px; font-weight: 600; color: var(--text); width: 28px; }

    .campus-filter-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .campus-filter-row select {
      background: rgba(255,255,255,0.07); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 7px 12px; font-size: 13px; outline: none;
    }
    .campus-filter-row select:focus { border-color: var(--accent); }
    .campus-filter-row select option { background: var(--surface); }

    @media (max-width: 600px) { .page-body { padding: 12px; } }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="app-shell">

    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo-wrap-sm"><img src="assets/fca-logo.png" alt="FCA"></div>
        <div class="sidebar-brand-text">
          <span class="sidebar-brand-name">Kingdom Invaders</span>
          <span class="sidebar-brand-org">FCA</span>
        </div>
      </div>
      <ul class="nav-list">
        <li><a href="home.html"     class="nav-link">Home</a></li>
        <li><a href="calendar.html" class="nav-link">Calendar</a></li>
        <li><a href="players.html"  class="nav-link">Players</a></li>
        <li><a href="staffing.html" class="nav-link active">Staffing</a></li>
        <li><a href="topics.html"   class="nav-link">Topics</a></li>
        <li><a href="gallery.html"  class="nav-link">Gallery</a></li>
        <li><a href="manage.html"   class="nav-link admin-only">Manage</a></li>
      </ul>
      <div class="nav-bottom">
        <div class="user-name" id="nav-name">—</div>
        <div class="user-role" id="nav-role">—</div>
        <div style="margin-top:10px;">
          <a href="profile.html" style="color:var(--muted);font-size:13px;text-decoration:none;">Profile</a>
          &nbsp;·&nbsp;
          <a href="#" id="logout-link" style="color:var(--muted);font-size:13px;text-decoration:none;">Sign out</a>
        </div>
      </div>
    </nav>

    <div class="main-content">
      <div class="topbar">
        <button class="hamburger" id="hamburger">☰</button>
        <span class="topbar-title">Staffing &amp; Metrics</span>
      </div>

      <div class="page-body" id="page-body">
        <div class="loading-center"><span class="spinner"></span></div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    let staffing = [];
    let metrics  = {};

    async function init() {
      document.getElementById("nav-name").textContent = user.full_name || "—";
      document.getElementById("nav-role").textContent = user.role || "—";
      if (!isAdmin()) document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");

      const [staffRes, metRes] = await Promise.all([
        apiGet({ action: "getStaffing" }),
        apiGet({ action: "getMetrics", campus_id: isAdmin() ? "" : (user.campus_assignment || "") })
      ]);

      staffing = Array.isArray(staffRes) ? staffRes : [];
      metrics  = (metRes && !metRes.stub) ? metRes : {};

      render();
    }

    function render() {
      const body = document.getElementById("page-body");

      // Summary stats
      const totalVols    = staffing.reduce((s, c) => s + c.volunteers.length, 0);
      const totalPlayers = metrics.total_players  || 0;
      const totalAtt     = metrics.total_attendance || 0;
      const totalEvents  = metrics.total_events   || 0;

      let html = `
        <div class="stats-grid">
          <div class="stat-card"><div class="num">${staffing.length}</div><div class="lbl">Campuses</div></div>
          <div class="stat-card"><div class="num">${totalVols}</div><div class="lbl">Volunteers</div></div>
          <div class="stat-card"><div class="num">${totalPlayers}</div><div class="lbl">Players</div></div>
          <div class="stat-card"><div class="num">${totalAtt}</div><div class="lbl">Attendance Records</div></div>
          <div class="stat-card"><div class="num">${totalEvents}</div><div class="lbl">Events</div></div>
        </div>`;

      // Campus blocks
      if (staffing.length) {
        html += `<div><div class="section-title">Volunteers by Campus</div>`;
        const visible = isAdmin() ? staffing : staffing.filter(c => c.campus_id === user.campus_assignment);
        visible.forEach(campus => {
          html += `
            <div class="campus-block" style="margin-bottom:12px;">
              <div class="campus-header">
                <h3>🏫 ${escHtml(campus.campus_name)}</h3>
                <div class="campus-stats">
                  <div class="campus-stat"><strong>${campus.volunteers.length}</strong> volunteer${campus.volunteers.length !== 1 ? "s" : ""}</div>
                  <div class="campus-stat"><strong>${campus.player_count}</strong> player${campus.player_count !== 1 ? "s" : ""}</div>
                </div>
              </div>
              <div class="campus-body">
                ${campus.volunteers.length ? campus.volunteers.map(v => `
                  <div class="vol-row">
                    <div class="vol-avatar">${escHtml(v.full_name.charAt(0).toUpperCase())}</div>
                    <div class="vol-info">
                      <div class="vol-name">${escHtml(v.full_name)}</div>
                      <div class="vol-user">@${escHtml(v.username)}</div>
                    </div>
                    <span class="badge badge-volunteer">Volunteer</span>
                  </div>`).join("") :
                  `<p style="color:var(--muted);font-size:13px;padding:8px 0;">No volunteers assigned</p>`}
                ${campus.categories && campus.categories.length ? `
                  <div class="cat-chips">
                    ${campus.categories.map(c => `
                      <div class="cat-chip">⚽ <strong>${escHtml(c.sport_type)}</strong> · ${escHtml(c.age_group)}</div>`).join("")}
                  </div>` : ""}
              </div>
            </div>`;
        });
        html += `</div>`;
      }

      // Metrics charts
      if (metrics.attendance_by_month || metrics.category_breakdown) {
        html += `
          <div>
            <div class="section-title">Metrics <span>— all time</span></div>
            <div class="metrics-grid">`;

        if (metrics.attendance_by_month && metrics.attendance_by_month.length) {
          const maxAtt = Math.max(...metrics.attendance_by_month.map(m => m.count), 1);
          html += `
            <div class="chart-card">
              <div class="chart-title">Attendance by Month</div>
              <div class="bar-chart">
                ${metrics.attendance_by_month.map(m => `
                  <div class="bar-row">
                    <div class="bar-label">${formatMonthLabel(m.month)}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(m.count/maxAtt*100)}%"></div></div>
                    <div class="bar-count">${m.count}</div>
                  </div>`).join("")}
              </div>
            </div>`;
        }

        if (metrics.category_breakdown && metrics.category_breakdown.length) {
          const maxCat = Math.max(...metrics.category_breakdown.map(c => c.count), 1);
          html += `
            <div class="chart-card">
              <div class="chart-title">Players by Category</div>
              <div class="bar-chart">
                ${metrics.category_breakdown.map(c => `
                  <div class="bar-row">
                    <div class="bar-label" style="width:90px;font-size:11px;">${escHtml(c.category)}</div>
                    <div class="bar-track"><div class="bar-fill special" style="width:${Math.round(c.count/maxCat*100)}%"></div></div>
                    <div class="bar-count">${c.count}</div>
                  </div>`).join("")}
              </div>
            </div>`;
        }

        html += `</div></div>`;
      }

      if (!staffing.length && !metrics.total_players) {
        html += `<div class="card" style="text-align:center;padding:48px;color:var(--muted);">No data yet. Add campuses and volunteers to see staffing.</div>`;
      }

      body.innerHTML = html;
    }

    function formatMonthLabel(ym) {
      if (!ym) return "—";
      const [y, m] = ym.split("-");
      const names = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `${names[parseInt(m)-1]} ${y.slice(2)}`;
    }

    function escHtml(s) {
      return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebar-overlay");
    document.getElementById("hamburger").addEventListener("click", () => { sidebar.classList.toggle("open"); overlay.classList.toggle("open"); });
    overlay.addEventListener("click", () => { sidebar.classList.remove("open"); overlay.classList.remove("open"); });
    document.getElementById("logout-link").addEventListener("click", e => { e.preventDefault(); logout(); });

    init();
  </script>
</body>
</html>
