<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCA CVR — Gallery</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Campus tab bar */
    .campus-tabs {
      display: flex; gap: 4px; padding: 16px 20px 0;
      border-bottom: 1px solid var(--border);
      overflow-x: auto; flex-shrink: 0;
    }
    .campus-tab {
      padding: 8px 18px; border-radius: 8px 8px 0 0;
      font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--muted); background: transparent;
      border: 1px solid transparent; border-bottom: none;
      white-space: nowrap; transition: all 0.15s;
    }
    .campus-tab:hover  { color: var(--text); background: rgba(255,255,255,0.04); }
    .campus-tab.active { color: var(--accent); background: var(--surface); border-color: var(--border); margin-bottom: -1px; padding-bottom: 9px; }

    /* Scrollable gallery area */
    .gallery-scroll { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 32px; }

    /* Week group */
    .week-group { display: flex; flex-direction: column; gap: 20px; }
    .week-label {
      font-size: 18px; font-weight: 800; color: var(--text);
      letter-spacing: -0.3px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* Day group */
    .day-group { display: flex; flex-direction: column; gap: 10px; }
    .day-label {
      font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.7px;
    }

    /* Photo grid — masonry-like using CSS columns */
    .photo-grid {
      columns: 4 160px; gap: 6px;
    }
    .photo-tile {
      break-inside: avoid; margin-bottom: 6px;
      position: relative; cursor: pointer;
      border-radius: 6px; overflow: hidden;
      background: var(--surface);
    }
    .photo-tile img {
      width: 100%; display: block;
      transition: transform 0.2s, opacity 0.2s;
    }
    .photo-tile:hover img { transform: scale(1.03); opacity: 0.88; }
    .photo-tile .tile-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
      opacity: 0; transition: opacity 0.2s;
      display: flex; align-items: flex-end; padding: 8px;
    }
    .photo-tile:hover .tile-overlay { opacity: 1; }
    .tile-caption { font-size: 11px; color: rgba(255,255,255,0.9); line-height: 1.3; }
    .tile-delete {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.6); color: #fff;
      border: none; border-radius: 4px; padding: 3px 7px;
      font-size: 11px; cursor: pointer; display: none;
    }
    .photo-tile:hover .tile-delete { display: block; }

    /* Empty state */
    .gallery-empty { text-align: center; padding: 80px 24px; color: var(--muted); }
    .gallery-empty p { margin-top: 12px; font-size: 14px; }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.96);
      align-items: center; justify-content: center;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }
    .lightbox-img-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 60px 80px; max-width: 100%; max-height: 100%;
    }
    .lightbox-img-wrap img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; border-radius: 6px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.8);
    }
    .lb-close {
      position: fixed; top: 16px; right: 20px;
      background: rgba(255,255,255,0.12); border: none; color: #fff;
      font-size: 22px; width: 40px; height: 40px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .lb-close:hover { background: rgba(255,255,255,0.22); }
    .lb-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      font-size: 24px; width: 48px; height: 48px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.22); }
    .lb-prev { left: 16px; }
    .lb-next { right: 16px; }
    .lb-info {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 20px; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: space-between;
    }
    .lb-caption  { font-size: 13px; color: rgba(255,255,255,0.8); }
    .lb-counter  { font-size: 12px; color: var(--muted); }

    /* Facebook-style photo picker */
    .fb-photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
      gap: 6px; margin-top: 10px;
    }
    .fb-photo-tile {
      aspect-ratio: 1; position: relative;
      border-radius: 8px; overflow: hidden;
      background: var(--surface);
    }
    .fb-photo-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .fb-remove {
      position: absolute; top: 4px; right: 4px;
      background: rgba(0,0,0,0.65); color: #fff;
      border: none; border-radius: 50%;
      width: 22px; height: 22px; font-size: 13px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .fb-remove:hover { background: rgba(220,50,50,0.85); }
    .fb-add-tile {
      aspect-ratio: 1; border: 2px dashed var(--border);
      border-radius: 8px; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted);
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      user-select: none;
    }
    .fb-add-tile:hover { border-color: var(--accent); background: rgba(29,181,132,0.07); color: var(--accent); }
    .fb-add-icon  { font-size: 26px; font-weight: 300; line-height: 1; }
    .fb-add-label { font-size: 10px; margin-top: 4px; font-weight: 600; letter-spacing: 0.3px; }

    .upload-progress { margin-top: 14px; }
    .progress-bar-wrap { background: rgba(255,255,255,0.08); border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.2s; width: 0; }
    .progress-label { font-size: 12px; color: var(--muted); margin-top: 6px; text-align: center; }

    @media (max-width: 700px) {
      .photo-grid { columns: 2 120px; }
      .gallery-scroll { padding: 16px 12px; }
      .lightbox-img-wrap { padding: 60px 16px; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="app-shell">

    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo-wrap-sm"><img src="assets/fca-logo.png" alt="FCA"></div>
        <div class="sidebar-brand-text">
          <span class="sidebar-brand-name">Kingdom Invaders</span>
          <span class="sidebar-brand-org">FCA</span>
        </div>
      </div>
      <ul class="nav-list">
        <li><a href="home.html"     class="nav-link">Home</a></li>
        <li><a href="calendar.html" class="nav-link">Calendar</a></li>
        <li><a href="players.html"  class="nav-link">Players</a></li>
        <li><a href="staffing.html" class="nav-link">Staffing</a></li>
        <li><a href="topics.html"   class="nav-link">Topics</a></li>
        <li><a href="gallery.html"  class="nav-link active">Gallery</a></li>
        <li><a href="manage.html"   class="nav-link admin-only">Manage</a></li>
      </ul>
      <div class="nav-bottom">
        <div class="user-name" id="nav-name">—</div>
        <div class="user-role" id="nav-role">—</div>
        <div style="margin-top:10px;">
          <a href="profile.html" style="color:var(--muted);font-size:13px;text-decoration:none;">Profile</a>
          &nbsp;·&nbsp;
          <a href="#" id="logout-link" style="color:var(--muted);font-size:13px;text-decoration:none;">Sign out</a>
        </div>
      </div>
    </nav>

    <div class="main-content" style="display:flex;flex-direction:column;overflow:hidden;">
      <div class="topbar">
        <button class="hamburger" id="hamburger">☰</button>
        <span class="topbar-title">Gallery</span>
        <button class="btn btn-primary btn-sm" id="upload-btn">+ Add Photos</button>
      </div>

      <div class="page-body">
        <div class="campus-tabs" id="campus-tabs">
          <div class="campus-tab active" data-id="">All Campuses</div>
        </div>
        <div class="gallery-scroll" id="gallery-scroll">
          <div class="loading-center"><span class="spinner"></span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lb-close">&#x2715;</button>
    <button class="lb-nav lb-prev" id="lb-prev">&#x2039;</button>
    <div class="lightbox-img-wrap">
      <img id="lb-img" src="" alt="">
    </div>
    <button class="lb-nav lb-next" id="lb-next">&#x203A;</button>
    <div class="lb-info">
      <span class="lb-caption" id="lb-caption"></span>
      <span class="lb-counter" id="lb-counter"></span>
    </div>
  </div>

  <!-- Upload Modal -->
  <div class="modal-backdrop" id="upload-modal">
    <div class="modal" style="max-width:500px;">
      <div class="modal-header">
        <h2>Add Photos</h2>
        <button class="modal-close" id="upload-modal-close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div id="upload-alert" class="alert alert-error" style="display:none;margin-bottom:12px;"></div>
        <div class="form-group">
          <label>Campus</label>
          <select id="up-campus"></select>
        </div>
        <div class="form-group">
          <label>Date Taken</label>
          <input type="date" id="up-date">
        </div>
        <div class="form-group">
          <label>Caption <span style="color:var(--muted);font-size:11px;">(optional, applies to all)</span></label>
          <input type="text" id="up-caption" placeholder="e.g. Practice session">
        </div>
        <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
        <div class="fb-photo-grid" id="fb-photo-grid">
          <!-- photo tiles injected here, + tile always last -->
          <div class="fb-add-tile" id="fb-add-tile">
            <div class="fb-add-icon">+</div>
            <div class="fb-add-label">Add Photos</div>
          </div>
        </div>
        <div class="upload-progress" id="upload-progress" style="display:none;">
          <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
          <div class="progress-label" id="progress-label">Preparing…</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="upload-cancel-btn">Cancel</button>
        <button type="button" class="btn btn-primary" id="upload-save-btn">Upload</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    requireAuth();
    const user = getUser();

    let campuses      = [];
    let allPhotos     = [];
    let activeCampus  = "";
    let lightboxPhotos = [];
    let lightboxIdx   = 0;
    let selectedFiles = [];

    async function init() {
      document.getElementById("nav-name").textContent = user.full_name || "—";
      document.getElementById("nav-role").textContent = user.role     || "—";
      if (!isAdmin()) document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");

      const [campusRes, photoRes] = await Promise.all([
        apiGet({ action: "getCampuses" }),
        apiGet({ action: "getPhotos"   })
      ]);

      campuses  = Array.isArray(campusRes) ? campusRes : [];
      allPhotos = Array.isArray(photoRes)  ? photoRes  : [];

      buildTabs();
      buildCampusSelect();
      renderGallery();
    }

    // ── Campus tabs ────────────────────────────────────────────
    function buildTabs() {
      const bar = document.getElementById("campus-tabs");
      bar.innerHTML = '<div class="campus-tab active" data-id="">All Campuses</div>';
      campuses.forEach(c => {
        const d = document.createElement("div");
        d.className = "campus-tab";
        d.dataset.id = c.campus_id;
        d.textContent = c.campus_name;
        bar.appendChild(d);
      });
      bar.addEventListener("click", e => {
        const tab = e.target.closest(".campus-tab");
        if (!tab) return;
        document.querySelectorAll(".campus-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        activeCampus = tab.dataset.id;
        renderGallery();
      });
    }

    function buildCampusSelect() {
      const sel = document.getElementById("up-campus");
      sel.innerHTML = '<option value="">— Select Campus —</option>';
      campuses.forEach(c => {
        const o = document.createElement("option");
        o.value = c.campus_id; o.textContent = c.campus_name;
        sel.appendChild(o);
      });
    }

    // ── Render gallery ─────────────────────────────────────────
    function renderGallery() {
      const filtered = activeCampus
        ? allPhotos.filter(p => p.campus_id === activeCampus)
        : allPhotos;

      const scroll = document.getElementById("gallery-scroll");

      if (!filtered.length) {
        scroll.innerHTML = '<div class="gallery-empty"><p>No photos yet.</p></div>';
        return;
      }

      // Group: week → day → photos
      const weeks = {};
      filtered.forEach(ph => {
        const wk = getWeekLabel(ph.date_taken);
        const dy = ph.date_taken;
        if (!weeks[wk]) weeks[wk] = {};
        if (!weeks[wk][dy]) weeks[wk][dy] = [];
        weeks[wk][dy].push(ph);
      });

      // Build lightbox flat list in same order
      lightboxPhotos = [];
      const weekKeys = Object.keys(weeks).sort((a, b) => {
        const da = weeks[a]; const db = weeks[b];
        return Object.keys(db)[0] > Object.keys(da)[0] ? 1 : -1;
      });

      scroll.innerHTML = weekKeys.map(wk => {
        const days = weeks[wk];
        const dayKeys = Object.keys(days).sort((a, b) => b > a ? 1 : -1);
        return `
          <div class="week-group">
            <div class="week-label">${escHtml(wk)}</div>
            ${dayKeys.map(dy => {
              const photos = days[dy];
              return `
                <div class="day-group">
                  <div class="day-label">${formatDayLabel(dy)}</div>
                  <div class="photo-grid">
                    ${photos.map(ph => {
                      const lbIdx = lightboxPhotos.length;
                      lightboxPhotos.push(ph);
                      const thumb = `https://drive.google.com/thumbnail?id=${ph.drive_file_id}&sz=w400`;
                      const canDelete = isAdmin() || ph.uploaded_by === getUser().user_id;
                      const delBtn = canDelete
                        ? `<button class="tile-delete" onclick="deletePhoto(event,'${ph.photo_id}')">Delete</button>`
                        : "";
                      return `
                        <div class="photo-tile" onclick="openLightbox(${lbIdx})">
                          <img src="${thumb}" alt="${escHtml(ph.caption)}" loading="lazy"
                               onerror="this.closest('.photo-tile').style.display='none'">
                          <div class="tile-overlay">
                            ${ph.caption ? `<span class="tile-caption">${escHtml(ph.caption)}</span>` : ""}
                          </div>
                          ${delBtn}
                        </div>`;
                    }).join("")}
                  </div>
                </div>`;
            }).join("")}
          </div>`;
      }).join("");
    }

    function getWeekLabel(dateStr) {
      const d = new Date(dateStr + "T00:00:00Z");
      const dow = d.getUTCDay();
      const monday = new Date(d);
      monday.setUTCDate(d.getUTCDate() - ((dow + 6) % 7));
      return "Week of " + monday.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric", timeZone: "UTC" });
    }

    function formatDayLabel(dateStr) {
      const d = new Date(dateStr + "T00:00:00Z");
      return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", timeZone: "UTC" });
    }

    // ── Lightbox ───────────────────────────────────────────────
    function openLightbox(idx) {
      lightboxIdx = idx;
      showLightboxPhoto();
      document.getElementById("lightbox").classList.add("open");
    }

    function showLightboxPhoto() {
      const ph   = lightboxPhotos[lightboxIdx];
      const full = `https://drive.google.com/thumbnail?id=${ph.drive_file_id}&sz=w1600`;
      document.getElementById("lb-img").src     = full;
      document.getElementById("lb-caption").textContent = ph.caption || "";
      document.getElementById("lb-counter").textContent = `${lightboxIdx + 1} / ${lightboxPhotos.length}`;
    }

    document.getElementById("lb-close").onclick = () => document.getElementById("lightbox").classList.remove("open");
    document.getElementById("lb-prev").onclick   = () => { lightboxIdx = (lightboxIdx - 1 + lightboxPhotos.length) % lightboxPhotos.length; showLightboxPhoto(); };
    document.getElementById("lb-next").onclick   = () => { lightboxIdx = (lightboxIdx + 1) % lightboxPhotos.length; showLightboxPhoto(); };
    document.getElementById("lightbox").addEventListener("click", e => { if (e.target === e.currentTarget) document.getElementById("lightbox").classList.remove("open"); });
    document.addEventListener("keydown", e => {
      if (!document.getElementById("lightbox").classList.contains("open")) return;
      if (e.key === "ArrowLeft")  { lightboxIdx = (lightboxIdx - 1 + lightboxPhotos.length) % lightboxPhotos.length; showLightboxPhoto(); }
      if (e.key === "ArrowRight") { lightboxIdx = (lightboxIdx + 1) % lightboxPhotos.length; showLightboxPhoto(); }
      if (e.key === "Escape")     document.getElementById("lightbox").classList.remove("open");
    });

    // ── Delete photo ───────────────────────────────────────────
    async function deletePhoto(e, photoId) {
      e.stopPropagation();
      if (!confirm("Delete this photo?")) return;
      const res = await apiPost({ action: "deletePhoto", photo_id: photoId });
      if (!res.error) {
        allPhotos = allPhotos.filter(p => p.photo_id !== photoId);
        lightboxPhotos = lightboxPhotos.filter(p => p.photo_id !== photoId);
        renderGallery();
      }
    }

    // ── Upload modal ───────────────────────────────────────────
    const fileInput = document.getElementById("file-input");
    const addTile   = document.getElementById("fb-add-tile");

    document.getElementById("upload-btn")?.addEventListener("click", () => {
      document.getElementById("up-campus").value  = "";
      document.getElementById("up-date").value    = new Date().toISOString().slice(0,10);
      document.getElementById("up-caption").value = "";
      document.getElementById("upload-progress").style.display = "none";
      hideAlert(document.getElementById("upload-alert"));
      selectedFiles = [];
      resetPhotoGrid();
      openModal("upload-modal");
    });

    document.getElementById("upload-modal-close").onclick = () => closeModal("upload-modal");
    document.getElementById("upload-cancel-btn").onclick  = () => closeModal("upload-modal");

    addTile.addEventListener("click", () => { fileInput.value = ""; fileInput.click(); });
    fileInput.addEventListener("change", () => handleFiles([...fileInput.files]));

    function resetPhotoGrid() {
      const grid = document.getElementById("fb-photo-grid");
      // Remove all tiles except the + tile
      grid.querySelectorAll(".fb-photo-tile").forEach(t => t.remove());
    }

    function handleFiles(newFiles) {
      newFiles = newFiles.filter(f => f.type.startsWith("image/"));
      if (!newFiles.length) return;
      const grid = document.getElementById("fb-photo-grid");
      newFiles.forEach((f, i) => {
        const idx = selectedFiles.length + i;
        const tile = document.createElement("div");
        tile.className = "fb-photo-tile";
        tile.dataset.idx = idx;

        const img = document.createElement("img");
        img.src = URL.createObjectURL(f);

        const btn = document.createElement("button");
        btn.className = "fb-remove";
        btn.innerHTML = "&#x2715;";
        btn.onclick = () => {
          selectedFiles.splice(Number(tile.dataset.idx), 1);
          // Re-index remaining tiles
          grid.querySelectorAll(".fb-photo-tile").forEach((t, i) => t.dataset.idx = i);
          tile.remove();
        };

        tile.appendChild(img);
        tile.appendChild(btn);
        grid.insertBefore(tile, addTile); // always keep + at end
      });
      selectedFiles = [...selectedFiles, ...newFiles];
    }

    async function compressImage(file, maxW = 1400, quality = 0.82) {
      return new Promise(resolve => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = url;
      });
    }

    document.getElementById("upload-save-btn").addEventListener("click", async () => {
      const alertEl  = document.getElementById("upload-alert");
      const campusId = document.getElementById("up-campus").value;
      const date     = document.getElementById("up-date").value;
      const caption  = document.getElementById("up-caption").value.trim();

      if (!campusId)          { showAlert(alertEl, "Please select a campus."); return; }
      if (!date)              { showAlert(alertEl, "Please select a date."); return; }
      if (!selectedFiles.length) { showAlert(alertEl, "Please select at least one photo."); return; }

      hideAlert(alertEl);
      const btn      = document.getElementById("upload-save-btn");
      const progress = document.getElementById("upload-progress");
      const bar      = document.getElementById("progress-bar");
      const label    = document.getElementById("progress-label");

      btn.disabled = true;
      progress.style.display = "block";

      let done = 0;
      const errors = [];

      for (const file of selectedFiles) {
        label.textContent = `Uploading ${done + 1} of ${selectedFiles.length}…`;
        bar.style.width   = `${Math.round(done / selectedFiles.length * 100)}%`;
        try {
          const dataUrl = await compressImage(file);
          const base64  = dataUrl.split(",")[1];
          const res = await apiPost({
            action:    "uploadPhoto",
            filename:  file.name,
            base64:    base64,
            mimeType:  "image/jpeg",
            campus_id: campusId,
            date_taken: date,
            caption:   caption
          });
          if (res.error) errors.push(file.name + ": " + res.error);
          else allPhotos.unshift({ photo_id: res.photo_id, drive_file_id: res.drive_file_id, campus_id: campusId, date_taken: date, caption });
        } catch(e) {
          errors.push(file.name + ": upload failed");
        }
        done++;
        bar.style.width = `${Math.round(done / selectedFiles.length * 100)}%`;
      }

      btn.disabled = false;

      if (errors.length) {
        showAlert(alertEl, errors.join("; "));
      } else {
        closeModal("upload-modal");
        selectedFiles = [];
        renderGallery();
      }
      progress.style.display = "none";
    });

    function escHtml(s) {
      return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebar-overlay");
    document.getElementById("hamburger").addEventListener("click", () => { sidebar.classList.toggle("open"); overlay.classList.toggle("open"); });
    overlay.addEventListener("click", () => { sidebar.classList.remove("open"); overlay.classList.remove("open"); });
    document.getElementById("logout-link").addEventListener("click", e => { e.preventDefault(); logout(); });
    document.querySelectorAll(".modal-backdrop").forEach(b => {
      b.addEventListener("click", e => { if (e.target === b) b.classList.remove("open"); });
    });

    init();
  </script>
</body>
</html>
