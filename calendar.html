<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCA CVR — Calendar</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Calendar-specific styles ── */
    .cal-container { flex: 1; display: flex; flex-direction: column; padding: 20px 24px; gap: 16px; overflow: hidden; }

    /* Controls row */
    .cal-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .cal-nav-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text);
      width: 34px; height: 34px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .cal-nav-btn:hover { background: rgba(255,255,255,0.15); }
    .cal-month-label { font-size: 20px; font-weight: 700; min-width: 180px; }
    .cal-today-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cal-today-btn:hover { background: rgba(255,255,255,0.15); color: var(--text); }
    .cal-controls-right { margin-left: auto; display: flex; gap: 8px; }

    /* Grid */
    .cal-grid { flex: 1; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }

    .cal-day-headers {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      flex-shrink: 0;
    }
    .cal-day-header {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      padding: 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .cal-weeks { flex: 1; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }

    .cal-week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      flex: 1;
    }

    .cal-cell {
      background: var(--surface);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      transition: background 0.12s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-height: 80px;
    }
    .cal-cell:hover { background: rgba(255,255,255,0.06); }
    .cal-cell.empty { background: transparent; cursor: default; pointer-events: none; }
    .cal-cell.other-month { opacity: 0.35; }

    .day-num {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cal-cell.today .day-num {
      background: var(--accent);
      color: #fff;
    }

    .event-chip {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: opacity 0.12s;
    }
    .event-chip:hover { opacity: 0.8; }
    .event-chip.regular { background: rgba(29,181,132,0.25); color: var(--highlight); border-left: 2px solid var(--accent); }
    .event-chip.special { background: rgba(37,232,154,0.2); color: #7fffcd; border-left: 2px solid var(--highlight); }
    .event-chip.more    { background: rgba(255,255,255,0.08); color: var(--muted); border-left: none; }

    /* Event detail modal extras */
    .detail-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
    .detail-icon { font-size: 16px; width: 22px; flex-shrink: 0; margin-top: 1px; }
    .detail-label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .detail-value { font-size: 14px; }

    .chip-type {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
    }
    .chip-type.regular { background: rgba(29,181,132,0.2); color: var(--accent); }
    .chip-type.special { background: rgba(37,232,154,0.15); color: var(--highlight); }

    /* Recurrence options */
    .recurrence-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .weeks-input    { width: 80px !important; }

    /* Volunteer multi-select */
    .volunteer-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .vol-chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(29,181,132,0.15);
      border: 1px solid rgba(29,181,132,0.3);
      color: var(--text);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .vol-chip.selected { background: rgba(29,181,132,0.35); border-color: var(--accent); }
    .vol-chip:hover    { background: rgba(29,181,132,0.25); }

    /* Delete series prompt */
    .series-prompt {
      background: rgba(232,92,92,0.1);
      border: 1px solid rgba(232,92,92,0.3);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 12px;
      font-size: 13px;
    }
    .series-prompt p { color: var(--muted); margin-bottom: 10px; }
    .series-prompt .series-btns { display: flex; gap: 8px; }

    @media (max-width: 768px) {
      .cal-container { padding: 12px; gap: 10px; }
      .cal-month-label { font-size: 16px; min-width: auto; }
      .event-chip { display: none; }
      .cal-cell.has-events::after {
        content: '';
        display: block;
        width: 6px; height: 6px;
        background: var(--accent);
        border-radius: 50%;
        margin: 2px auto 0;
      }
      .cal-cell { min-height: 48px; }
      .day-num { font-size: 12px; width: 22px; height: 22px; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-shell">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo-wrap-sm">
          <img src="assets/fca-logo.png" alt="FCA Logo">
        </div>
        <div class="sidebar-brand-text">
          <span class="sidebar-brand-name">Kingdom Invaders</span>
          <span class="sidebar-brand-org">FCA</span>
        </div>
      </div>
      <ul class="nav-list">
        <li><a href="home.html"     class="nav-link">Home</a></li>
        <li><a href="calendar.html" class="nav-link active">Calendar</a></li>
        <li><a href="players.html"  class="nav-link">Players</a></li>
        <li><a href="staffing.html" class="nav-link">Staffing</a></li>
        <li><a href="topics.html"   class="nav-link">Topics</a></li>
        <li><a href="gallery.html"  class="nav-link">Gallery</a></li>
        <li><a href="manage.html"   class="nav-link admin-only">Manage</a></li>
      </ul>
      <div class="nav-bottom">
        <div class="user-name" id="nav-name">—</div>
        <div class="user-role" id="nav-role">—</div>
        <div style="margin-top:10px;">
          <a href="profile.html" style="color:var(--muted);font-size:13px;text-decoration:none;">Profile</a>
          &nbsp;·&nbsp;
          <a href="#" id="logout-link" style="color:var(--muted);font-size:13px;text-decoration:none;">Sign out</a>
        </div>
      </div>
    </nav>

    <!-- Main -->
    <div class="main-content">
      <div class="topbar">
        <button class="hamburger" id="hamburger">☰</button>
        <span class="topbar-title">Calendar</span>
        <button class="btn btn-primary btn-sm admin-only" id="new-event-btn">+ New Event</button>
      </div>

      <div class="cal-container">
        <!-- Controls -->
        <div class="cal-controls">
          <button class="cal-nav-btn" id="prev-btn">‹</button>
          <button class="cal-nav-btn" id="next-btn">›</button>
          <span class="cal-month-label" id="month-label"></span>
          <button class="cal-today-btn" id="today-btn">Today</button>
          <div class="cal-controls-right">
            <select id="campus-filter" style="background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:13px;outline:none;">
              <option value="">All Campuses</option>
            </select>
          </div>
        </div>

        <!-- Grid -->
        <div class="cal-grid">
          <div class="cal-day-headers">
            <div class="cal-day-header">Sun</div>
            <div class="cal-day-header">Mon</div>
            <div class="cal-day-header">Tue</div>
            <div class="cal-day-header">Wed</div>
            <div class="cal-day-header">Thu</div>
            <div class="cal-day-header">Fri</div>
            <div class="cal-day-header">Sat</div>
          </div>
          <div class="cal-weeks" id="cal-weeks">
            <div class="loading-center"><span class="spinner"></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Event Detail Modal ── -->
  <div class="modal-backdrop" id="detail-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="detail-title">Event</h2>
        <button class="modal-close" onclick="closeModal('detail-modal')">×</button>
      </div>
      <div class="modal-body" id="detail-body"></div>
      <div class="modal-footer" id="detail-footer"></div>
    </div>
  </div>

  <!-- ── Create / Edit Event Modal ── -->
  <div class="modal-backdrop" id="event-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="event-modal-title">New Event</h2>
        <button class="modal-close" onclick="closeModal('event-modal')">×</button>
      </div>
      <div class="modal-body">
        <div id="event-alert" class="alert alert-error" style="display:none;"></div>
        <form id="event-form">
          <input type="hidden" id="edit-event-id">
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="ev-date" required>
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="time" id="ev-time">
          </div>
          <div class="form-group">
            <label>Campus</label>
            <select id="ev-campus" required></select>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="ev-category"></select>
          </div>
          <div class="form-group">
            <label>Event Type</label>
            <select id="ev-type">
              <option value="regular">Regular</option>
              <option value="special">Special</option>
            </select>
          </div>
          <div class="form-group">
            <label>Topic (optional)</label>
            <select id="ev-topic">
              <option value="">— None —</option>
            </select>
          </div>
          <div class="form-group">
            <label>Volunteers</label>
            <div class="volunteer-chips" id="vol-chips"></div>
          </div>
          <div class="form-group" id="recurrence-group">
            <label>Recurrence</label>
            <div class="recurrence-row">
              <select id="ev-recurrence">
                <option value="none">None (single event)</option>
                <option value="weekly">Weekly</option>
              </select>
              <span id="weeks-wrapper" style="display:none;">
                for <input type="number" id="ev-weeks" class="weeks-input" value="12" min="1" max="52"> weeks
              </span>
            </div>
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea id="ev-notes" placeholder="Optional notes…"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('event-modal')">Cancel</button>
        <button type="button" class="btn btn-primary" id="save-event-btn">Save Event</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    requireAuth();

    // ── State ────────────────────────────────────────────────────
    const user       = getUser();
    let currentYear  = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1; // 1-based
    let events       = [];
    let campuses     = [];
    let categories   = [];
    let topics       = [];
    let volunteers   = [];
    let selectedVolIds = [];
    let editingEventId = null;

    const MONTH_NAMES = ["January","February","March","April","May","June",
                         "July","August","September","October","November","December"];
    const today = new Date();

    // ── Init ─────────────────────────────────────────────────────
    async function init() {
      // Nav user info
      document.getElementById("nav-name").textContent = user.full_name || user.user_id;
      document.getElementById("nav-role").textContent = user.role;

      // Hide admin-only elements for volunteers
      if (!isAdmin()) {
        document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
      }

      // Load EVERYTHING in parallel including the current month's events (was 2 sequential round trips)
      const initialCampus = document.getElementById("campus-filter").value || "";
      const [campusRes, catRes, topicRes, staffRes, eventsRes] = await Promise.all([
        apiGet({ action: "getCampuses" }).catch(() => []),
        getCategories(),
        getTopics(),
        apiGet({ action: "getStaffing" }).catch(() => []),
        getEvents(currentMonth, currentYear, initialCampus).catch(() => [])
      ]);
      events = Array.isArray(eventsRes) ? eventsRes : [];

      campuses   = Array.isArray(campusRes) ? campusRes : [];
      categories = Array.isArray(catRes)    ? catRes    : [];
      topics     = Array.isArray(topicRes)  ? topicRes  : [];

      // getStaffing returns campus groups, each with .volunteers — flatten + dedupe
      const volMap = {};
      if (Array.isArray(staffRes)) {
        staffRes.forEach(group => {
          (group.volunteers || []).forEach(v => {
            if (!volMap[v.user_id]) volMap[v.user_id] = v;
          });
        });
      }
      volunteers = Object.values(volMap);

      populateCampusFilter();
      populateEventForm();
      // Skip extra round trip — events already loaded above
      document.getElementById("month-label").textContent =
        `${MONTH_NAMES[currentMonth - 1]} ${currentYear}`;
      renderGrid();
    }

    function populateCampusFilter() {
      const sel = document.getElementById("campus-filter");
      // Remove existing options except "All"
      while (sel.options.length > 1) sel.remove(1);
      campuses.forEach(c => {
        const o = document.createElement("option");
        o.value = c.campus_id;
        o.textContent = c.campus_name;
        sel.appendChild(o);
      });
      // For volunteers, pre-select their campus
      if (!isAdmin() && user.campus_assignment) {
        sel.value = user.campus_assignment;
        sel.disabled = true;
      }
    }

    function populateEventForm() {
      // Campus select
      const campusSel = document.getElementById("ev-campus");
      campusSel.innerHTML = '<option value="">— Select Campus —</option>';
      campuses.forEach(c => {
        const o = document.createElement("option");
        o.value = c.campus_id;
        o.textContent = c.campus_name;
        campusSel.appendChild(o);
      });

      // Category select (filtered on campus change)
      campusSel.addEventListener("change", () => populateCategories(campusSel.value));

      // Topics
      const topicSel = document.getElementById("ev-topic");
      topics.forEach(t => {
        const o = document.createElement("option");
        o.value = t.topic_id;
        o.textContent = t.title;
        topicSel.appendChild(o);
      });

      // Recurrence weeks toggle
      document.getElementById("ev-recurrence").addEventListener("change", e => {
        document.getElementById("weeks-wrapper").style.display =
          e.target.value === "weekly" ? "inline-flex" : "none";
      });
    }

    function populateCategories(campusId) {
      const sel = document.getElementById("ev-category");
      sel.innerHTML = '<option value="">— All Categories —</option>';
      categories
        .filter(c => !campusId || c.campus_id === campusId)
        .forEach(c => {
          const o = document.createElement("option");
          o.value = c.category_id;
          o.textContent = `${c.sport_type} · ${c.age_group}`;
          sel.appendChild(o);
        });
    }

    function renderVolunteerChips(selected = []) {
      selectedVolIds = [...selected];
      const container = document.getElementById("vol-chips");
      if (!volunteers.length) {
        container.innerHTML = '<span style="color:var(--muted);font-size:13px;">No volunteers found</span>';
        return;
      }
      container.innerHTML = volunteers.map(v => `
        <div class="vol-chip ${selectedVolIds.includes(v.user_id) ? 'selected' : ''}"
             data-id="${v.user_id}" onclick="toggleVol('${v.user_id}', this)">
          ${v.full_name}
        </div>
      `).join("");
    }

    function toggleVol(userId, el) {
      if (selectedVolIds.includes(userId)) {
        selectedVolIds = selectedVolIds.filter(id => id !== userId);
        el.classList.remove("selected");
      } else {
        selectedVolIds.push(userId);
        el.classList.add("selected");
      }
    }

    // ── Calendar rendering ────────────────────────────────────────
    async function loadMonth() {
      document.getElementById("month-label").textContent =
        `${MONTH_NAMES[currentMonth - 1]} ${currentYear}`;
      document.getElementById("cal-weeks").innerHTML =
        '<div class="loading-center"><span class="spinner"></span></div>';

      const campusFilter = document.getElementById("campus-filter").value;
      const res = await getEvents(currentMonth, currentYear, campusFilter);
      events = Array.isArray(res) ? res : [];

      renderGrid();
    }

    function renderGrid() {
      const firstDow   = new Date(currentYear, currentMonth - 1, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      const weeksEl    = document.getElementById("cal-weeks");

      // Group events by date string
      const byDate = {};
      events.forEach(ev => {
        if (!byDate[ev.date]) byDate[ev.date] = [];
        byDate[ev.date].push(ev);
      });

      let html = "";
      let day = 1;
      const totalCells = Math.ceil((firstDow + daysInMonth) / 7) * 7;

      for (let cell = 0; cell < totalCells; cell++) {
        if (cell % 7 === 0) html += '<div class="cal-week">';

        if (cell < firstDow || day > daysInMonth) {
          html += '<div class="cal-cell empty"></div>';
        } else {
          const dateStr = `${currentYear}-${pad2(currentMonth)}-${pad2(day)}`;
          const dayEvs  = byDate[dateStr] || [];
          const isToday = (day === today.getDate() &&
                           currentMonth === today.getMonth() + 1 &&
                           currentYear  === today.getFullYear());

          const MAX_CHIPS = 3;
          const visible   = dayEvs.slice(0, MAX_CHIPS);
          const overflow  = dayEvs.length - MAX_CHIPS;

          const chipsHtml = visible.map(ev => {
            const label = formatTime(ev.time) || ev.event_type;
            return `<div class="event-chip ${ev.event_type}"
                         onclick="event.stopPropagation(); openDetail('${ev.event_id}')">${label}</div>`;
          }).join("") +
          (overflow > 0 ? `<div class="event-chip more">+${overflow} more</div>` : "");

          html += `
            <div class="cal-cell ${isToday ? 'today' : ''} ${dayEvs.length ? 'has-events' : ''}"
                 data-date="${dateStr}" onclick="onDayClick('${dateStr}')">
              <div class="day-num">${day}</div>
              ${chipsHtml}
            </div>`;
          day++;
        }

        if ((cell + 1) % 7 === 0) html += '</div>';
      }

      weeksEl.innerHTML = html;
    }

    // ── Event Detail ──────────────────────────────────────────────
    function openDetail(eventId) {
      const ev = events.find(e => e.event_id === eventId);
      if (!ev) return;

      document.getElementById("detail-title").textContent =
        ev.event_type === "special" ? "⭐ Special Event" : "📅 Event";

      const recLabel = ev.recurrence && ev.recurrence.type !== "none"
        ? `Weekly · ${ev.recurrence.total} weeks`
        : "Single event";

      document.getElementById("detail-body").innerHTML = `
        <div class="detail-row">
          <div class="detail-icon">📆</div>
          <div>
            <div class="detail-label">Date &amp; Time</div>
            <div class="detail-value">${formatDateLabel(ev.date)}${ev.time ? ' · ' + formatTime(ev.time) : ''}</div>
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-icon">🏫</div>
          <div>
            <div class="detail-label">Campus · Category</div>
            <div class="detail-value">${(() => {
              const c = campuses.find(x => x.campus_id === ev.campus_id);
              const cat = categories.find(x => x.category_id === ev.category_id);
              const campusLabel = c ? c.campus_name : (ev.campus_id || "");
              const catLabel = cat ? ((cat.sport_type || "") + " · " + (cat.age_group || "")).replace(/^ · | · $/g, "") : (ev.category_id || "");
              return catLabel ? campusLabel + " · " + catLabel : campusLabel;
            })()}</div>
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-icon">👥</div>
          <div>
            <div class="detail-label">Volunteers</div>
            <div class="detail-value">${(ev.volunteer_names || []).join(", ") || "—"}</div>
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-icon">🔁</div>
          <div>
            <div class="detail-label">Recurrence</div>
            <div class="detail-value">${recLabel}</div>
          </div>
        </div>
        ${ev.topic_id ? `
        <div class="detail-row">
          <div class="detail-icon">📖</div>
          <div>
            <div class="detail-label">Topic</div>
            <div class="detail-value">${(() => {
              const t = topics.find(x => x.topic_id === ev.topic_id);
              return t ? (t.title || ev.topic_id) : ev.topic_id;
            })()}</div>
          </div>
        </div>` : ''}
        ${ev.notes ? `
        <div class="detail-row">
          <div class="detail-icon">📝</div>
          <div>
            <div class="detail-label">Notes</div>
            <div class="detail-value">${ev.notes}</div>
          </div>
        </div>` : ''}
        <div style="margin-top:8px;">
          <span class="chip-type ${ev.event_type}">${ev.event_type}</span>
        </div>
        <div id="delete-series-prompt"></div>
      `;

      const footer = document.getElementById("detail-footer");
      footer.innerHTML = "";

      // Take Attendance — available to all logged-in users
      const attBtn = document.createElement("a");
      attBtn.className = "btn btn-primary btn-sm";
      attBtn.textContent = "📋 Take Attendance";
      attBtn.href = `attendance.html?event_id=${ev.event_id}`;
      footer.appendChild(attBtn);

      if (isAdmin()) {
        const editBtn = document.createElement("button");
        editBtn.className = "btn btn-ghost btn-sm";
        editBtn.textContent = "Edit";
        editBtn.onclick = () => { closeModal("detail-modal"); openEditModal(ev); };

        const delBtn = document.createElement("button");
        delBtn.className = "btn btn-danger btn-sm";
        delBtn.textContent = "Delete";
        delBtn.onclick = () => confirmDelete(ev);

        footer.appendChild(editBtn);
        footer.appendChild(delBtn);
      }

      openModal("detail-modal");
    }

    function confirmDelete(ev) {
      const promptEl = document.getElementById("delete-series-prompt");
      const isSeries = ev.recurrence && ev.recurrence.type !== "none";

      if (isSeries) {
        promptEl.innerHTML = `
          <div class="series-prompt">
            <p>This event is part of a recurring series. Delete just this event or the whole series?</p>
            <div class="series-btns">
              <button class="btn btn-danger btn-sm" onclick="doDelete('${ev.event_id}', false)">This Event</button>
              <button class="btn btn-danger btn-sm" onclick="doDelete('${ev.event_id}', true, '${ev.recurrence.group_id}')">Entire Series</button>
              <button class="btn btn-ghost btn-sm" onclick="document.getElementById('delete-series-prompt').innerHTML=''">Cancel</button>
            </div>
          </div>`;
      } else {
        doDelete(ev.event_id, false);
      }
    }

    async function doDelete(eventId, series, groupId) {
      closeModal("detail-modal");
      const opts = series ? { delete_series: true, group_id: groupId } : {};
      await deleteEvent(eventId, opts);
      await loadMonth();
    }

    // ── Create / Edit Modal ───────────────────────────────────────
    function onDayClick(dateStr) {
      if (!isAdmin()) return;
      openCreateModal(dateStr);
    }

    function openCreateModal(dateStr = "") {
      editingEventId = null;
      document.getElementById("event-modal-title").textContent = "New Event";
      document.getElementById("event-form").reset();
      document.getElementById("edit-event-id").value = "";
      document.getElementById("ev-date").value = dateStr;
      document.getElementById("ev-campus").value = user.campus_assignment || "";
      populateCategories(user.campus_assignment || "");
      document.getElementById("weeks-wrapper").style.display = "none";
      renderVolunteerChips([]);
      hideAlert(document.getElementById("event-alert"));
      openModal("event-modal");
    }

    function openEditModal(ev) {
      editingEventId = ev.event_id;
      document.getElementById("event-modal-title").textContent = "Edit Event";
      document.getElementById("edit-event-id").value = ev.event_id;
      document.getElementById("ev-date").value = ev.date;
      document.getElementById("ev-time").value = ev.time || "";
      document.getElementById("ev-campus").value = ev.campus_id || "";
      populateCategories(ev.campus_id);
      document.getElementById("ev-category").value = ev.category_id || "";
      document.getElementById("ev-type").value = ev.event_type || "regular";
      document.getElementById("ev-topic").value = ev.topic_id || "";
      document.getElementById("ev-notes").value = ev.notes || "";
      document.getElementById("ev-recurrence").value = "none";
      document.getElementById("weeks-wrapper").style.display = "none";
      document.getElementById("recurrence-group").style.display = "none"; // hide on edit
      renderVolunteerChips(ev.volunteer_ids || []);
      hideAlert(document.getElementById("event-alert"));
      openModal("event-modal");
    }

    document.getElementById("save-event-btn").addEventListener("click", async () => {
      const alertEl = document.getElementById("event-alert");
      hideAlert(alertEl);

      const date     = document.getElementById("ev-date").value;
      const campusId = document.getElementById("ev-campus").value;
      if (!date || !campusId) {
        showAlert(alertEl, "Date and Campus are required.");
        return;
      }

      const payload = {
        date,
        time:          document.getElementById("ev-time").value,
        campus_id:     campusId,
        category_id:   document.getElementById("ev-category").value,
        event_type:    document.getElementById("ev-type").value,
        topic_id:      document.getElementById("ev-topic").value,
        notes:         document.getElementById("ev-notes").value,
        volunteer_ids: selectedVolIds,
        recurrence:    document.getElementById("ev-recurrence").value,
        weeks:         parseInt(document.getElementById("ev-weeks").value) || 1
      };

      const btn = document.getElementById("save-event-btn");
      btn.disabled = true;
      btn.textContent = "Saving…";

      try {
        let res;
        if (editingEventId) {
          res = await updateEvent(editingEventId, payload);
        } else {
          res = await createEvent(payload);
        }

        if (res.error) {
          showAlert(alertEl, res.error);
        } else {
          closeModal("event-modal");
          await loadMonth();
        }
      } catch (e) {
        showAlert(alertEl, "Connection error. Please try again.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Save Event";
      }
    });

    // ── Navigation ────────────────────────────────────────────────
    document.getElementById("prev-btn").addEventListener("click", () => {
      if (--currentMonth < 1) { currentMonth = 12; currentYear--; }
      loadMonth();
    });
    document.getElementById("next-btn").addEventListener("click", () => {
      if (++currentMonth > 12) { currentMonth = 1; currentYear++; }
      loadMonth();
    });
    document.getElementById("today-btn").addEventListener("click", () => {
      currentYear  = today.getFullYear();
      currentMonth = today.getMonth() + 1;
      loadMonth();
    });
    document.getElementById("campus-filter").addEventListener("change", loadMonth);
    document.getElementById("new-event-btn").addEventListener("click", () => openCreateModal());

    // ── Hamburger ─────────────────────────────────────────────────
    const sidebar  = document.getElementById("sidebar");
    const overlay  = document.getElementById("sidebar-overlay");
    document.getElementById("hamburger").addEventListener("click", () => {
      sidebar.classList.toggle("open");
      overlay.classList.toggle("open");
    });
    overlay.addEventListener("click", () => {
      sidebar.classList.remove("open");
      overlay.classList.remove("open");
    });

    // ── Logout ────────────────────────────────────────────────────
    document.getElementById("logout-link").addEventListener("click", e => {
      e.preventDefault();
      logout();
    });

    // ── Close modals on backdrop click ────────────────────────────
    document.querySelectorAll(".modal-backdrop").forEach(backdrop => {
      backdrop.addEventListener("click", e => {
        if (e.target === backdrop) backdrop.classList.remove("open");
      });
    });

    // ── Start ─────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
