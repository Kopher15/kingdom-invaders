<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCA CVR — Topics</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-body { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }

    .topics-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .topics-header input {
      flex: 1; min-width: 200px;
      background: rgba(255,255,255,0.07); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 8px 12px; font-size: 13px; outline: none;
    }
    .topics-header input:focus { border-color: var(--accent); }

    .topic-list { display: flex; flex-direction: column; gap: 10px; }

    .topic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .topic-card:hover { border-color: rgba(29,181,132,0.4); }

    .topic-card-header {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 18px; cursor: pointer; user-select: none;
    }
    .topic-card-header:hover { background: rgba(255,255,255,0.02); }

    .topic-num {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(29,181,132,0.15); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
    }

    .topic-meta { flex: 1; min-width: 0; }
    .topic-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .topic-passage { font-size: 13px; color: var(--accent); margin-bottom: 4px; }
    .topic-info { font-size: 12px; color: var(--muted); }

    .topic-expand-icon { color: var(--muted); font-size: 12px; transition: transform 0.2s; margin-top: 6px; }
    .topic-card.expanded .topic-expand-icon { transform: rotate(180deg); }

    .topic-body {
      display: none;
      padding: 0 18px 18px 64px;
      flex-direction: column;
      gap: 14px;
    }
    .topic-card.expanded .topic-body { display: flex; }

    .topic-section-label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px;
    }
    .topic-section-text {
      font-size: 14px; line-height: 1.65;
      white-space: pre-wrap; color: rgba(255,255,255,0.88);
    }

    .topic-actions { display: flex; gap: 8px; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 4px; }

    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }

    @media (max-width: 600px) {
      .page-body { padding: 12px; }
      .topic-body { padding-left: 18px; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="app-shell">

    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo-wrap-sm"><img src="assets/fca-logo.png" alt="FCA"></div>
        <div class="sidebar-brand-text">
          <span class="sidebar-brand-name">Kingdom Invaders</span>
          <span class="sidebar-brand-org">FCA</span>
        </div>
      </div>
      <ul class="nav-list">
        <li><a href="home.html"     class="nav-link">Home</a></li>
        <li><a href="calendar.html" class="nav-link">Calendar</a></li>
        <li><a href="players.html"  class="nav-link">Players</a></li>
        <li><a href="staffing.html" class="nav-link">Staffing</a></li>
        <li><a href="topics.html"   class="nav-link active">Topics</a></li>
        <li><a href="gallery.html"  class="nav-link">Gallery</a></li>
        <li><a href="manage.html"   class="nav-link admin-only">Manage</a></li>
      </ul>
      <div class="nav-bottom">
        <div class="user-name" id="nav-name">—</div>
        <div class="user-role" id="nav-role">—</div>
        <div style="margin-top:10px;">
          <a href="profile.html" style="color:var(--muted);font-size:13px;text-decoration:none;">Profile</a>
          &nbsp;·&nbsp;
          <a href="#" id="logout-link" style="color:var(--muted);font-size:13px;text-decoration:none;">Sign out</a>
        </div>
      </div>
    </nav>

    <div class="main-content">
      <div class="topbar">
        <button class="hamburger" id="hamburger">☰</button>
        <span class="topbar-title">Topics / Lesson Plans</span>
        <button class="btn btn-primary btn-sm" id="new-topic-btn">+ New Topic</button>
      </div>

      <div class="page-body">
        <div class="topics-header">
          <input type="text" id="search" placeholder="Search topics or passages…">
          <span id="count-label" style="color:var(--muted);font-size:13px;white-space:nowrap;"></span>
        </div>
        <div class="topic-list" id="topic-list">
          <div class="loading-center"><span class="spinner"></span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Topic Modal -->
  <div class="modal-backdrop" id="topic-modal">
    <div class="modal" style="max-width:560px;">
      <div class="modal-header">
        <h2 id="topic-modal-title">New Topic</h2>
        <button class="modal-close" onclick="closeModal('topic-modal')">×</button>
      </div>
      <div class="modal-body">
        <div id="topic-alert" class="alert alert-error" style="display:none;"></div>
        <form id="topic-form">
          <input type="hidden" id="edit-topic-id">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="t-title" placeholder="e.g. Faith Under Pressure" required>
          </div>
          <div class="form-group">
            <label>Bible Passage</label>
            <input type="text" id="t-passage" placeholder="e.g. Romans 5:3-5">
          </div>
          <div class="form-group">
            <label>Discussion Questions</label>
            <textarea id="t-questions" rows="6"
              placeholder="1. How do you handle pressure in sports?&#10;2. What does this passage mean to you?&#10;3. How can we support each other?"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('topic-modal')">Cancel</button>
        <button type="button" class="btn btn-primary" id="save-topic-btn">Save Topic</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm -->
  <div class="modal-backdrop" id="del-modal">
    <div class="modal" style="max-width:360px;">
      <div class="modal-header">
        <h2>Delete Topic</h2>
        <button class="modal-close" onclick="closeModal('del-modal')">×</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--muted);">Delete <strong id="del-title" style="color:var(--text);"></strong>? This cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('del-modal')">Cancel</button>
        <button class="btn btn-danger" id="confirm-del-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    let allTopics  = [];
    let deletingId = null;

    async function init() {
      document.getElementById("nav-name").textContent = user.full_name || "—";
      document.getElementById("nav-role").textContent = user.role || "—";
      if (!isAdmin()) document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
      await loadTopics();
    }

    async function loadTopics() {
      const res = await apiGet({ action: "getTopics" });
      allTopics = Array.isArray(res) ? res : [];
      render();
    }

    function render() {
      const q = document.getElementById("search").value.toLowerCase();
      const filtered = allTopics.filter(t =>
        !q || t.title.toLowerCase().includes(q) || (t.passage || "").toLowerCase().includes(q)
      );
      document.getElementById("count-label").textContent =
        `${filtered.length} topic${filtered.length !== 1 ? "s" : ""}`;

      const list = document.getElementById("topic-list");
      if (!filtered.length) {
        list.innerHTML = `<div class="empty-state">No topics yet. Create the first one!</div>`;
        return;
      }

      list.innerHTML = filtered.map((t, i) => `
        <div class="topic-card" id="tc-${t.topic_id}">
          <div class="topic-card-header" onclick="toggleCard('${t.topic_id}')">
            <div class="topic-num">${i + 1}</div>
            <div class="topic-meta">
              <div class="topic-title">${escHtml(t.title)}</div>
              ${t.passage ? `<div class="topic-passage">📜 ${escHtml(t.passage)}</div>` : ""}
              <div class="topic-info">Added ${t.date_created || "—"}</div>
            </div>
            <span class="topic-expand-icon">▼</span>
          </div>
          <div class="topic-body">
            ${t.passage ? `
            <div>
              <div class="topic-section-label">Passage</div>
              <div class="topic-section-text">${escHtml(t.passage)}</div>
            </div>` : ""}
            ${t.discussion_questions ? `
            <div>
              <div class="topic-section-label">Discussion Questions</div>
              <div class="topic-section-text">${escHtml(t.discussion_questions)}</div>
            </div>` : ""}
            <div class="topic-actions">
              <button class="btn btn-ghost btn-sm" onclick="openEdit(${JSON.stringify(t).replace(/"/g,'&quot;')})">Edit</button>
              ${isAdmin() ? `<button class="btn btn-danger btn-sm" onclick="openDelete('${t.topic_id}','${escHtml(t.title)}')">Delete</button>` : ""}
            </div>
          </div>
        </div>
      `).join("");
    }

    function toggleCard(id) {
      document.getElementById(`tc-${id}`).classList.toggle("expanded");
    }

    // ── Create / Edit ─────────────────────────────────────────────
    document.getElementById("new-topic-btn").addEventListener("click", () => {
      document.getElementById("topic-modal-title").textContent = "New Topic";
      document.getElementById("topic-form").reset();
      document.getElementById("edit-topic-id").value = "";
      hideAlert(document.getElementById("topic-alert"));
      openModal("topic-modal");
    });

    function openEdit(t) {
      document.getElementById("topic-modal-title").textContent = "Edit Topic";
      document.getElementById("edit-topic-id").value      = t.topic_id;
      document.getElementById("t-title").value            = t.title || "";
      document.getElementById("t-passage").value          = t.passage || "";
      document.getElementById("t-questions").value        = t.discussion_questions || "";
      hideAlert(document.getElementById("topic-alert"));
      openModal("topic-modal");
    }

    document.getElementById("save-topic-btn").addEventListener("click", async () => {
      const alertEl = document.getElementById("topic-alert");
      const id      = document.getElementById("edit-topic-id").value;
      const title   = document.getElementById("t-title").value.trim();
      if (!title) { showAlert(alertEl, "Title is required."); return; }

      const btn = document.getElementById("save-topic-btn");
      btn.disabled = true; btn.textContent = "Saving…";

      const payload = {
        title:                title,
        passage:              document.getElementById("t-passage").value.trim(),
        discussion_questions: document.getElementById("t-questions").value.trim()
      };

      try {
        const res = id
          ? await apiPost({ action: "updateTopic", topic_id: id, ...payload })
          : await apiPost({ action: "createTopic", ...payload });
        if (res.error) { showAlert(alertEl, res.error); return; }
        closeModal("topic-modal");
        await loadTopics();
      } catch(e) {
        showAlert(alertEl, "Connection error.");
      } finally {
        btn.disabled = false; btn.textContent = "Save Topic";
      }
    });

    // ── Delete ────────────────────────────────────────────────────
    function openDelete(id, title) {
      deletingId = id;
      document.getElementById("del-title").textContent = title;
      openModal("del-modal");
    }

    document.getElementById("confirm-del-btn").addEventListener("click", async () => {
      const res = await apiPost({ action: "deleteTopic", topic_id: deletingId });
      closeModal("del-modal");
      if (!res.error) await loadTopics();
    });

    document.getElementById("search").addEventListener("input", render);

    function escHtml(s) {
      return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebar-overlay");
    document.getElementById("hamburger").addEventListener("click", () => { sidebar.classList.toggle("open"); overlay.classList.toggle("open"); });
    overlay.addEventListener("click", () => { sidebar.classList.remove("open"); overlay.classList.remove("open"); });
    document.getElementById("logout-link").addEventListener("click", e => { e.preventDefault(); logout(); });
    document.querySelectorAll(".modal-backdrop").forEach(b => {
      b.addEventListener("click", e => { if (e.target === b) b.classList.remove("open"); });
    });

    init();
  </script>
</body>
</html>
