<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCA CVR — Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-divider {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin: 20px 0 4px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-wrap">
          <img src="assets/fca-logo.png" alt="FCA Logo">
        </div>
        <h1>Kingdom Invaders</h1>
        <div class="org-name">Fellowship of Christian Athletes</div>
        <p style="color:var(--muted);font-size:13px;margin-top:4px;">Volunteer Portal</p>
      </div>

      <div id="alert" class="alert alert-error" style="display:none;"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          Sign In
        </button>
      </form>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = "home.html";

    const form      = document.getElementById("login-form");
    const alertEl   = document.getElementById("alert");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlert(alertEl);

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        showAlert(alertEl, "Please enter your username and password.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Signing in…';

      try {
        const data = await login(username, password);

        if (data.error) {
          showAlert(alertEl, data.error);
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
          return;
        }

        saveSession(data);
        window.location.href = "home.html";

      } catch (err) {
        showAlert(alertEl, "Connection error. Please try again.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
